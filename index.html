<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <div class="background-logo"></div>

    <div class="login-container">

        <div style="margin-bottom: 25px;">
            <div style="background: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.15);">
                <i class="fa-solid fa-user-graduate" style="color: #1565c0; font-size: 30px;"></i>
            </div>
            <h1>Student Attendance</h1>
            <h3>Management System</h3>
            <div style="color: #e3f2fd; font-size: 15px; margin-top: 10px; opacity: 0.85; font-weight: 500;">
                <i class="fa-solid fa-user-lock" style="font-size: 13px; margin-right: 5px;"></i> Login Portal
            </div>
        </div>

        <form id="loginForm">

            <div class="input-box">
                <i class="fa-solid fa-users"></i>
                <select id="loginType" required>
                    <option value="admin">Admin Login</option>
                    <option value="student">Student Login</option>
                </select>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter Username / Roll No" autocomplete="off" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div class="options-link">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="rememberMe" style="accent-color: #1565c0; width: auto; padding: 0;"> Remember Me
                </label>
                <a href="#" id="forgotPassword">Forgot Password?</a>
            </div>

            <button class="login-btn" type="submit">
                <i class="fa-solid fa-right-to-bracket" style="margin-right: 5px;"></i> Login
            </button>

            <p id="error"></p>

        </form>
