<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <div class="login-container">

        <div style="background: #fff; width: 75px; height: 75px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
            <i class="fa-solid fa-user-graduate" style="color: #1565c0; font-size: 34px;"></i>
        </div>

        <h1>Student Attendance</h1>
        <h3>Management System</h3>

        <form id="loginForm">

            <div class="input-box">
                <i class="fa-solid fa-users"></i>
                <select id="loginType" required>
                    <option value="admin">Admin Login</option>
                    <option value="student">Student Login</option>
                </select>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter Username / Roll No" autocomplete="off" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div style="display: flex; justify-content: flex-start; margin-top: -5px; margin-bottom: 20px; padding: 0 5px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: rgba(255, 255, 255, 0.85); font-size: 13px;">
                    <input type="checkbox" id="rememberMe" style="accent-color: #1565c0; cursor: pointer; width: auto;"> Remember Me
                </label>
            </div>

            <button class="login-btn" type="submit">
                <i class="fa-solid fa-right-to-bracket" style="margin-right: 6px;"></i> Login
            </button>

            <p id="error"></p>

        </form>

        <hr>

        <div class="footer">
            © 2026 Student Attendance Management System
        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
