<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Attendance Management System</title>

    <link rel="stylesheet" href="css/login.css">

    
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <div class="login-container">

       
        <div class="logo">
            <img src="images/sams-logo.png" alt="SAMS Logo">
        </div>

        <h1>Student Attendance</h1>
        <h3>Management System</h3>

        <form id="loginForm">

            <!-- Login Type -->
            <div class="input-box">

                <i class="fa-solid fa-users"></i>

                <select id="loginType" required>
                    <option value="admin">Admin Login</option>
                    <option value="student">Student Login</option>
                </select>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username / Roll No"
                    autocomplete="off"
                    required>

            </div>

          
            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required>

                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>

            </div>

            <button class="login-btn" type="submit">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

            <p id="error"></p>

        </form>

        <hr style="margin:25px 0; opacity:.3;">

        <div class="demo">

            <h4>Demo Credentials</h4>

            <div class="credential">

                <i class="fa-solid fa-user-tie"></i>

                <div>
                    <strong>Admin</strong><br>
                    Username : <b>admin</b><br>
                    Password : <b>admin123</b>
                </div>

            </div>

            <div class="credential">

                <i class="fa-solid fa-user-graduate"></i>

                <div>
                    <strong>Student</strong><br>
                    Roll No : <b>23CSE001</b><br>
                    Password : <b>rahul123</b>
                </div>

            </div>

        </div>

        <div class="footer">
            © 2026 Student Attendance Management System
        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
